<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription - API Service</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <a href="index.html" class="logo">
                <i class="fas fa-arrow-left"></i>
                Back to Home
            </a>
        </header>

        <main class="form-page">
            <div class="form-container">
                <div class="form-header">
                    <i class="fas fa-crown"></i>
                    <h1>Premium Subscription</h1>
                    <p>Get daily automated API calls for your UID</p>
                </div>

                <div class="pricing-card">
                    <div class="pricing-header">
                        <h3>Premium Plan</h3>
                        <div class="price">
                            <span class="currency">₹</span>
                            <span class="amount">99</span>
                            <span class="period">/month</span>
                        </div>
                    </div>
                    
                    <ul class="features-list">
                        <li><i class="fas fa-check"></i> Daily automated API calls</li>
                        <li><i class="fas fa-check"></i> Personal dashboard access</li>
                        <li><i class="fas fa-check"></i> API call history</li>
                        <li><i class="fas fa-check"></i> 24/7 automation</li>
                        <li><i class="fas fa-check"></i> Priority support</li>
                    </ul>
                </div>

                <form id="paymentForm" class="api-form">
                    <div class="form-group">
                        <label for="customerName">
                            <i class="fas fa-user"></i>
                            Full Name
                        </label>
                        <input 
                            type="text" 
                            id="customerName" 
                            name="name" 
                            placeholder="Enter your full name"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="customerEmail">
                            <i class="fas fa-envelope"></i>
                            Email Address
                        </label>
                        <input 
                            type="email" 
                            id="customerEmail" 
                            name="email" 
                            placeholder="Enter your email"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="customerPhone">
                            <i class="fas fa-phone"></i>
                            Phone Number
                        </label>
                        <input 
                            type="tel" 
                            id="customerPhone" 
                            name="phone" 
                            placeholder="Enter your phone number"
                            required
                        >
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-credit-card"></i>
                        Pay ₹99 & Subscribe
                        <div class="loading-spinner"></div>
                    </button>
                </form>

                <div class="security-badges">
                    <div class="badge">
                        <i class="fas fa-shield-alt"></i>
                        <span>Secure Payment</span>
                    </div>
                    <div class="badge">
                        <i class="fas fa-lock"></i>
                        <span>SSL Encrypted</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
