<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Subscription Service</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="logo">
                <i class="fas fa-rocket"></i>
                API Service
            </h1>
            <nav class="nav">
                <a href="/admin" class="admin-link">
                    <i class="fas fa-cog"></i> Admin
                </a>
            </nav>
        </header>

        <main class="hero">
            <div class="hero-content">
                <h1 class="hero-title">
                    Professional API Service
                    <span class="gradient-text">with Daily Automation</span>
                </h1>
                <p class="hero-description">
                    Choose your access level: Try our service for free or subscribe for daily automated API calls
                </p>

                <div class="cta-buttons">
                    <a href="free-mode.html" class="btn btn-secondary">
                        <i class="fas fa-play"></i>
                        <span>Free Mode</span>
                        <small>One-time API call</small>
                    </a>
                    
                    <a href="subscription.html" class="btn btn-primary">
                        <i class="fas fa-crown"></i>
                        <span>Paid Subscription</span>
                        <small>Daily automated calls</small>
                    </a>
                </div>

                <div class="features">
                    <div class="feature">
                        <i class="fas fa-bolt"></i>
                        <span>Fast & Reliable</span>
                    </div>
                    <div class="feature">
                        <i class="fas fa-shield-alt"></i>
                        <span>Secure Payment</span>
                    </div>
                    <div class="feature">
                        <i class="fas fa-clock"></i>
                        <span>24/7 Automation</span>
                    </div>
                </div>
            </div>

            <div class="hero-animation">
                <div class="floating-shapes">
                    <div class="shape shape-1"></div>
                    <div class="shape shape-2"></div>
                    <div class="shape shape-3"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
